name: Build and Deploy ASP.NET Core App + WebJob to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Publish Web App
        run: |
          dotnet publish ./WebApplication2/WebApplication2.csproj `
            --configuration Release `
            --output publish_output

      - name: Publish WebJob into Web App output
        run: |
          dotnet publish ./PracticeWebJob/PracticeWebJob.csproj `
            --configuration Release `
            --output publish_output/App_Data/jobs/continuous/PracticeWebJob

      - name: Verify combined output structure
        run: |
          if (-not (Test-Path "publish_output\WebApplication2.dll")) {
            Write-Error "Web app output is missing — WebApplication2.dll not found"
            exit 1
          }
          if (-not (Test-Path "publish_output\App_Data\jobs\continuous\PracticeWebJob\PracticeWebJob.exe")) {
            Write-Error "WebJob output is missing — PracticeWebJob.exe not found"
            exit 1
          }
          $files = Get-ChildItem publish_output -Recurse -File
          $mb = [math]::Round((($files | Measure-Object Length -Sum).Sum) / 1MB, 2)
          Write-Host "publish_output OK: $($files.Count) files, $mb MB"

      - name: Package publish output into a zip
        run: |
          if (Test-Path app.zip) { Remove-Item app.zip -Force }
          Compress-Archive -Path publish_output\* -DestinationPath app.zip -Force
          $zip = Get-Item app.zip
          $mb = [math]::Round($zip.Length / 1MB, 2)
          Write-Host "app.zip size: $mb MB"
          if ($zip.Length -lt 100KB) {
            Write-Error "app.zip is only $mb MB — package looks empty, aborting deploy"
            exit 1
          }

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_37451ADCF54A41C0ADEC80A7B61B2707 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B743B99ADFB84864B5870A23DF1A3714 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_044363105A2B490490D9072DC24BD44F }}

      - name: Deploy Web App and WebJob together
        uses: azure/webapps-deploy@v3
        with:
          app-name: CSharpWebApp
          slot-name: Production
          package: app.zip
