name: Build and Deploy ASP.NET Core App + WebJob to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Publish Web App
        run: |
          dotnet publish ./WebApplication2/WebApplication2.csproj `
            --configuration Release `
            --no-build `
            --output publish_output

      - name: Publish WebJob into Web App output
        run: |
          dotnet publish ./PracticeWebJob/PracticeWebJob.csproj `
            --configuration Release `
            --output publish_output/App_Data/jobs/continuous/PracticeWebJob

      - name: Verify combined output structure
        run: |
          if (!(Test-Path "publish_output\App_Data\jobs\continuous\PracticeWebJob")) {
            Write-Error "WebJob output folder is missing — aborting deployment"
            exit 1
          }
          Write-Host "WebJob found. Combined output structure:"
          tree publish_output /F

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_37451ADCF54A41C0ADEC80A7B61B2707 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B743B99ADFB84864B5870A23DF1A3714 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_044363105A2B490490D9072DC24BD44F }}

      - name: Deploy Web App and WebJob together
        uses: azure/webapps-deploy@v3
        with:
          app-name: CSharpWebApp
          slot-name: Production
          package: publish_output
