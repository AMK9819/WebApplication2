# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

# The display name shown in the GitHub Actions tab for this workflow.
name: Build and deploy ASP.Net Core app to Azure Web App

# WHEN this workflow runs.
on:
  # 1. Automatically on every push to main or beta.
  #    Each branch listed here maps to an environment in the `setup` job below.
  push:
    branches:
      - main
      - beta
  # 2. Manually from the Actions tab via the "Run workflow" button.
  #    Manual runs let you pick which environment to deploy to via a dropdown,
  #    independent of which branch you ran it from.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        # Listed beta first so it's the default — accidental clicks
        # of "Run workflow" go to the non-critical environment.
        options:
          - beta
          - production

# A workflow is made of one or more jobs. Each job runs on its own fresh VM.
# Files don't persist between jobs unless you upload them as an artifact.
jobs:

  # -------------------------------------------------------------------------
  # JOB 1: setup
  # Decides which GitHub Environment (production / beta) this run targets.
  # Putting the branch -> environment mapping here means the build and deploy
  # jobs don't need to know anything about branches — they just read the result.
  # Adding a new environment later = one new case line below + a new branch above.
  # -------------------------------------------------------------------------
  setup:
    # Lightweight Linux runner — we're only doing string work, no .NET or Azure here.
    runs-on: ubuntu-latest

    # Values this job exposes to later jobs via `needs.setup.outputs.<name>`.
    outputs:
      environment: ${{ steps.pick.outputs.environment }}

    steps:
      # Single step: resolve the target environment name into a job output.
      - id: pick
        # bash so the case statement and $GITHUB_OUTPUT syntax work consistently.
        shell: bash
        run: |
          # If a human clicked "Run workflow," use their dropdown choice.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            env="${{ inputs.environment }}"
          else
            # Otherwise it's an automatic push — map the branch name to an env.
            case "${{ github.ref }}" in
              refs/heads/main) env="production" ;;
              refs/heads/beta) env="beta" ;;
              # Fail loudly if someone adds a branch trigger above but forgets
              # to add a case here — safer than silently picking a default.
              *) echo "No environment mapped for ${{ github.ref }}" >&2; exit 1 ;;
            esac
          fi
          # Log the decision for the run timeline, then expose it as an output
          # by appending `name=value` to the special $GITHUB_OUTPUT file.
          echo "Resolved environment: $env"
          echo "environment=$env" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # JOB 2: build
  # Compiles the web app + WebJob and packages them into a single artifact.
  # The same artifact gets deployed to whichever environment is selected.
  # This is the "build once, deploy many" pattern: the bytes that ship to prod
  # are the literal bytes that were tested in beta.
  # -------------------------------------------------------------------------
  build:
    # Windows runner because the app targets the Windows .NET hosting stack
    # and IIS-style WebJob layout. (Linux would also work for the .NET build
    # itself, but Windows keeps everything consistent with the App Service host.)
    runs-on: windows-latest
    permissions:
      contents: read # Required so actions/checkout can read the repo.

    steps:
        # 1. Pull the repo onto the runner so we have source code to build.
      - uses: actions/checkout@v4

        # 2. Install the .NET 10 SDK on the runner.
        #    Also sets the DOTNET_ROOT env var, which is reused as a publish path below.
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

        # 3. Compile the whole solution in Release mode.
        #    Release = optimized IL, no debug symbols beyond PDBs, no DEBUG #if blocks.
        #    Same configuration for every environment (see "build once, deploy many").
      - name: Build with dotnet
        run: dotnet build --configuration Release

        # 4. Publish the web app to a folder. "Publish" = compile + collect every
        #    runtime dependency (DLLs, content files, config) into a self-contained
        #    deploy-ready layout.
        #    DOTNET_ROOT was set by setup-dotnet@v4 and points at the SDK install
        #    directory; we're just borrowing it as a convenient writable absolute path.
      - name: dotnet publish (web app)
        run: dotnet publish WebApplication2/WebApplication2.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

        # 5. Publish the WebJob INSIDE the web app's publish folder, under the
        #    magic path App_Data/jobs/continuous/<jobname>/.
        #    When Azure App Service unpacks the deployment, it scans App_Data/jobs/
        #    and auto-registers anything it finds as a WebJob.
        #      - "continuous" = runs nonstop in the background (vs. "triggered").
        #      - "PracticeWebJob" = the display name that shows up in the portal.
        #    Result: one artifact contains both the website and the WebJob, and
        #    one deploy ships both.
      - name: dotnet publish (WebJob)
        run: dotnet publish PracticeWebJob/PracticeWebJob.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp/App_Data/jobs/continuous/PracticeWebJob"

        # 6. Zip up the publish folder and store it on GitHub's servers under
        #    the name ".net-app". The deploy job downloads it on a fresh runner.
        #    Artifacts are how files cross the job boundary — each job's filesystem
        #    is destroyed when it finishes.
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # -------------------------------------------------------------------------
  # JOB 3: deploy
  # Pushes the artifact to whichever Azure App Service matches the target
  # environment. Per-environment values (secrets + app name) come from the
  # GitHub Environment selected via `environment:` below, NOT from this file.
  # -------------------------------------------------------------------------
  deploy:
    runs-on: windows-latest
    # Wait for both prior jobs: we need setup's output to know which env to
    # target, and build's artifact to have something to deploy.
    needs: [setup, build]

    # THE LINCHPIN of the whole multi-env design.
    # This scopes the job to a GitHub Environment (production or beta), which
    # automatically swaps in that environment's secrets and variables.
    # The same ${{ secrets.AZURE_CLIENT_ID }} below resolves to a DIFFERENT
    # value depending on which environment this job is running for.
    # Adding a new target = create a new Environment in repo settings;
    # zero changes needed inside this job.
    environment: ${{ needs.setup.outputs.environment }}

    permissions:
      id-token: write # Required so GitHub can mint the OIDC JWT we trade to Azure.
      contents: read  # Required for actions/checkout (not used here, but conventional).

    steps:
      # 1. Pull down the .net-app artifact uploaded by the build job.
      #    Extracts into the current working directory by default.
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      # 2. Authenticate to Azure via OIDC (no stored passwords or secrets!).
      #    Flow: GitHub mints a short-lived JWT describing this workflow run
      #    (repo + environment); Azure checks it against the managed identity's
      #    federated credential; if they match, Azure hands back an access token.
      #    The three IDs below resolve from the GitHub Environment's secrets,
      #    so they're different per environment without any branch logic here.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 3. Push the artifact to Azure App Service.
      #    - app-name: which App Service to deploy to. Comes from the Environment's
      #      `vars.AZURE_APP_NAME` so production -> WebJobWebApplication2 and
      #      beta -> WebJobWebApplicationBeta automatically.
      #    - slot-name "Production" refers to the App Service's default slot
      #      (every App Service has one), NOT to the production *environment*.
      #      The beta app also deploys to its own "Production" slot.
      #    - package "." means "deploy everything in the current directory,"
      #      which is what download-artifact just unpacked here.
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          slot-name: 'Production'
          package: .
